<!doctype html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartMock AI — Admin</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #F5F3FC; margin: 0; padding: 20px; color: #1A1440; }
  h1 { font-size: 20px; margin-bottom: 16px; }
  .card { background: #fff; border: 1px solid #E5E0F5; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  input { width: 100%; padding: 10px; border: 1px solid #E5E0F5; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; }
  button { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #4B2FBE; color: #fff; width: 100%; }
  .btn-ok { background: #1FA152; color: #fff; margin-right: 8px; }
  .btn-bad { background: #E0463F; color: #fff; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .name { font-weight: 600; font-size: 14px; }
  .sub { font-size: 12px; color: #6B6489; margin-top: 2px; }
  .empty { text-align: center; color: #6B6489; padding: 30px 0; font-size: 13px; }
  #error { color: #E0463F; font-size: 13px; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>Admin panel — kirish</h1>
  <div class="card">
    <div id="error"></div>
    <input id="password" type="password" placeholder="Admin parol" />
    <button class="btn-primary" onclick="login()">Kirish</button>
  </div>
</div>

<div id="dashboard" style="display:none">
  <h1>O'qituvchilik so'rovlari</h1>
  <div id="list"></div>
</div>

<script>
  const API_BASE = window.location.origin + "/api/v1";
  let password = localStorage.getItem("admin_pw") || "";

  async function api(path, opts = {}) {
    const res = await fetch(API_BASE + path, {
      ...opts,
      headers: { "Content-Type": "application/json", "X-Admin-Password": password, ...(opts.headers || {}) },
    });
    if (!res.ok) throw new Error("Xato: " + res.status);
    return res.json();
  }

  async function login() {
    password = document.getElementById("password").value;
    document.getElementById("error").textContent = "";
    try {
      await api("/admin/teacher-requests");
      localStorage.setItem("admin_pw", password);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadRequests();
    } catch (e) {
      document.getElementById("error").textContent = "Noto'g'ri parol yoki server xatosi.";
    }
  }

  async function loadRequests() {
    const list = document.getElementById("list");
    list.innerHTML = "Yuklanmoqda...";
    try {
      const reqs = await api("/admin/teacher-requests");
      if (!reqs.length) {
        list.innerHTML = '<div class="empty">Hozircha kutilayotgan so\'rov yo\'q.</div>';
        return;
      }
      list.innerHTML = reqs.map(r => `
        <div class="card">
          <div class="row">
            <div>
              <div class="name">${r.userName || "Ism kiritilmagan"}</div>
              <div class="sub">Telegram ID: ${r.userId}</div>
              <div class="sub">${new Date(r.createdAt).toLocaleString("uz-UZ")}</div>
            </div>
          </div>
          <div style="margin-top:12px">
            <button class="btn-ok" onclick="approve(${r.id})">Tasdiqlash</button>
            <button class="btn-bad" onclick="reject(${r.id})">Rad etish</button>
          </div>
        </div>
      `).join("");
    } catch (e) {
      list.innerHTML = '<div class="empty">Yuklashda xatolik.</div>';
    }
  }

  async function approve(id) {
    await api(`/admin/teacher-requests/${id}/approve`, { method: "POST" });
    loadRequests();
  }
  async function reject(id) {
    await api(`/admin/teacher-requests/${id}/reject`, { method: "POST" });
    loadRequests();
  }

  // Avval saqlangan parol bo'lsa, avtomatik kirishga harakat qiladi.
  if (password) {
    document.getElementById("password").value = password;
    login();
  }
</script>
</body>
</html>
